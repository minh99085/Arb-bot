# Cloud schedule for scan + postmortem (no secrets in logs).
# Enable manually: copy to .github/workflows/ and set repo secrets if needed.
# Default: disabled via workflow_dispatch only — enable schedule when ready.

name: polymarket-arb-worker

on:
  workflow_dispatch:
    inputs:
      jobs:
        description: "Comma-separated jobs: scan,loop,reconcile,postmortem"
        required: false
        default: "scan,postmortem"
  # Uncomment to run on a schedule (UTC):
  # schedule:
  #   - cron: "*/30 * * * *"   # scan-ish
  #   - cron: "0 6 * * *"      # daily postmortem

jobs:
  arb-once:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install "websockets==15.0.1"
      - name: Run worker once
        env:
          ARB_STATE_DIR: ${{ runner.temp }}/arb-state
          ARB_STUDY_MODE: "true"
          ARB_EXEC_MODE: paper
          ARB_DRY_RUN: "true"
          ARB_KILL_SWITCH: "false"
          ARB_ALLOW_LIVE: "false"
          ARB_WORKER_SCAN_LIMIT: "50"
        run: |
          JOBS="${{ github.event.inputs.jobs || 'scan,postmortem' }}"
          python -m arb worker once --jobs "$JOBS" --json
      - name: Upload state artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arb-state
          path: ${{ runner.temp }}/arb-state
          if-no-files-found: ignore
