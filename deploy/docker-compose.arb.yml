# Polymarket arb bot — paper worker (Windows / Mac / Linux Docker Desktop)
#
# From repo root:
#   copy deploy\arb.docker.env.example arb.docker.env
#   docker compose -f deploy/docker-compose.arb.yml up -d --build
#
# Logs:
#   docker compose -f deploy/docker-compose.arb.yml logs -f arb-worker
#
# One-shot alpha pre-flight:
#   docker compose -f deploy/docker-compose.arb.yml run --rm arb-alpha

services:
  arb-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.arb
    image: polymarket-arb:local
    container_name: polymarket-arb-paper
    restart: unless-stopped
    env_file:
      - path: ../arb.docker.env
        required: false
    environment:
      HERMES_HOME: /data
      ARB_STUDY_MODE: "false"
      ARB_EXEC_MODE: paper
      ARB_DRY_RUN: "true"
      ARB_KILL_SWITCH: "false"
      ARB_ALLOW_LIVE: "false"
      ARB_SCAN_SOURCE: events
      ARB_MIN_EDGE_BPS: "-30"
      ARB_TAKER_FEE_BPS: "2"
      ARB_VERIFY_TOP_N: "200"
      ARB_MIN_BOOK_DEPTH: "1"
      ARB_PAPER_GAMMA_FALLBACK: "true"
      ARB_MAX_POSITION_USD: "10"
      ARB_MAX_OPEN_POSITIONS: "30"
      ARB_MAX_DAILY_TRADES: "300"
      ARB_WORKER_USE_WS: "false"
      ARB_WORKER_PAPER: "true"
      ARB_WORKER_SCAN_SEC: "60"
      ARB_WORKER_LOOP_SEC: "60"
      ARB_WORKER_TRADE_LIMIT: "30"
      ARB_SELF_TUNE: "true"
    volumes:
      # Windows Docker Desktop: %USERPROFILE%\.hermes → /data
      - ${USERPROFILE}/.hermes:/data
    command: ["python", "-m", "arb", "worker", "run", "--paper"]

  arb-dashboard:
    image: polymarket-arb:local
    build:
      context: ..
      dockerfile: deploy/Dockerfile.arb
    container_name: polymarket-arb-dashboard
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      HERMES_HOME: /data
      ARB_DASHBOARD_HOST: "0.0.0.0"
      ARB_DASHBOARD_PORT: "8787"
    volumes:
      - ${USERPROFILE}/.hermes:/data
    command: ["python", "-m", "arb", "dashboard", "--host", "0.0.0.0", "--port", "8787", "--trades", "50"]

  arb-alpha:
    profiles: ["tools"]
    image: polymarket-arb:local
    build:
      context: ..
      dockerfile: deploy/Dockerfile.arb
    env_file:
      - path: ../arb.docker.env
        required: false
    environment:
      HERMES_HOME: /data
    volumes:
      - ${USERPROFILE}/.hermes:/data
    command: ["python", "-m", "arb", "alpha", "--liquid", "200"]
    stdin_open: false
    tty: false

  arb-scan:
    profiles: ["tools"]
    image: polymarket-arb:local
    build:
      context: ..
      dockerfile: deploy/Dockerfile.arb
    env_file:
      - path: ../arb.docker.env
        required: false
    environment:
      HERMES_HOME: /data
    volumes:
      - ${USERPROFILE}/.hermes:/data
    command: ["python", "-m", "arb", "scan", "--study", "--top", "10"]

  arb-status:
    profiles: ["tools"]
    image: polymarket-arb:local
    build:
      context: ..
      dockerfile: deploy/Dockerfile.arb
    environment:
      HERMES_HOME: /data
    volumes:
      - ${USERPROFILE}/.hermes:/data
    command: ["python", "-m", "arb", "status"]
